<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Richiesta Video – Sunshine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #20232b 0, #050608 55%, #000000 100%);
            color: #f5f5f5;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .wrapper {
            max-width: 600px;
            margin: 60px auto;
            padding: 24px;
            background: rgba(0,0,0,0.55);
            border-radius: 16px;
            box-shadow: 0 0 22px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.08);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            font-size: 26px;
            letter-spacing: 0.06em;
            color: #f8f0d8;
            text-shadow: 0 0 8px rgba(255, 215, 128, 0.6);
        }

        p {
            text-align: center;
            color: #d0d0d0;
            margin-bottom: 24px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            background: #050609;
            color: #f5f5f5;
            font-size: 15px;
            font-family: Cambria, "Times New Roman", serif;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #f0c878;
            box-shadow: 0 0 6px rgba(240,200,120,0.6);
        }

        button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #f0c878;
            background: radial-gradient(circle at top, #f7d58c 0, #c28a3a 50%, #7a4b16 100%);
            color: #1a1208;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        button:hover {
            filter: brightness(1.05);
        }

        .back {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #f0c878;
            text-decoration: none;
            font-size: 14px;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>Richiedi un Video</h1>
        <p>Scrivi il titolo del video che vorresti vedere nella Sala Premiere.</p>

        <!-- FORM STATIC.APP -->
        <form method="POST" action="/forms">
            <input type="text" name="nome" placeholder="Il tuo nome (opzionale)">
            <textarea name="richiesta" rows="4" placeholder="Quale video vorresti vedere?" required></textarea>

            <button type="submit">Invia Richiesta</button>
        </form>

        <a href="index.html" class="back">← Torna alla Home</a>
    </div>

</body>
</html>
